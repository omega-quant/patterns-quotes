<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Patterns</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    background: #0f0f0f;
    color: #fff;
    height: 100vh;
    overflow: hidden;
}

/* PARTICLE CANVAS */
#particles {
    position: fixed;
    width: 100%;
    height: 100%;
    z-index: -1;
}

/* CENTER CONTAINER */
.container {
    position: relative;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* GLASS CARD */
.card {
    background: rgba(255,255,255,0.05);
    border-radius: 20px;
    padding: 40px;
    width: 90%;
    max-width: 700px;
    backdrop-filter: blur(15px);
    box-shadow: 0 0 40px rgba(255,255,255,0.05);
    text-align: center;
    animation: float 6s ease-in-out infinite;
}

/* FLOAT ANIMATION */
@keyframes float {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-10px); }
    100% { transform: translateY(0px); }
}

/* TITLE */
h1 {
    margin-bottom: 20px;
    letter-spacing: 3px;
    font-size: 2.5rem;
    background: linear-gradient(90deg, #fff, #aaa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

/* QUOTE */
.quote {
    font-size: 1.3rem;
    line-height: 1.6;
    min-height: 80px;
}

/* SUBTEXT */
.subtext {
    font-size: 0.9rem;
    color: #aaa;
    margin: 15px 0;
}

/* BUTTON */
button {
    padding: 10px 20px;
    margin: 5px;
    border: none;
    border-radius: 25px;
    background: linear-gradient(90deg, #fff, #bbb);
    color: #111;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.1);
}

/* INPUT */
textarea {
    width: 100%;
    margin-top: 15px;
    padding: 10px;
    border-radius: 10px;
    border: none;
    resize: none;
    background: rgba(255,255,255,0.1);
    color: #fff;
}

/* GLOW EFFECT */
.card::before {
    content: "";
    position: absolute;
    inset: -2px;
    border-radius: 20px;
    background: linear-gradient(45deg, #00f2ff, #ff00ff, #00ff88);
    filter: blur(20px);
    opacity: 0.2;
    z-index: -1;
}
</style>
</head>

<body>

<canvas id="particles"></canvas>

<div class="container">
    <div class="card">
        <h1>Patterns</h1>

        <div id="quote" class="quote"></div>
        <div id="subtext" class="subtext"></div>

        <button onclick="nextQuote()">Next →</button>

        <textarea id="userQuote" placeholder="Write your thought..."></textarea>
        <button onclick="addQuote()">Add Thought</button>
    </div>
</div>

<script>
// QUOTES
let quotes = [
{
text: "The worst déjà vu isn’t a moment—it’s people. I give my best every time… and they still get bored in the end.",
sub: "— when effort isn’t valued, patterns repeat"
},
{
text: "Sometimes people don’t say they’re bored of you… they just start choosing others over you.",
sub: "— silence speaks"
},
{
text: "When your presence isn’t valued, they won’t say it… they’ll just drift away quietly.",
sub: "— absence reveals truth"
},
{
text: "They won’t tell you they’re bored… they’ll just put in their earbuds or choose someone else over you.",
sub: "— distance without words"
}
];

// LOAD USER QUOTES
if(localStorage.getItem("userQuotes")){
    quotes = quotes.concat(JSON.parse(localStorage.getItem("userQuotes")));
}

let index = 0;

// TYPING EFFECT
function typeText(text, element, speed = 30) {
    element.innerHTML = "";
    let i = 0;

    function typing() {
        if (i < text.length) {
            element.innerHTML += text.charAt(i);
            i++;
            setTimeout(typing, speed);
        }
    }
    typing();
}

function showQuote(i) {
    typeText(quotes[i].text, document.getElementById("quote"));
    document.getElementById("subtext").innerText = quotes[i].sub;
}

function nextQuote() {
    index = (index + 1) % quotes.length;
    showQuote(index);
}

// ADD USER QUOTE
function addQuote() {
    const input = document.getElementById("userQuote").value.trim();
    if(!input) return;

    const newQuote = { text: input, sub: "— user thought" };

    let userQuotes = JSON.parse(localStorage.getItem("userQuotes")) || [];
    userQuotes.push(newQuote);
    localStorage.setItem("userQuotes", JSON.stringify(userQuotes));

    quotes.push(newQuote);
    document.getElementById("userQuote").value = "";
    alert("Added!");
}

// INITIAL LOAD
showQuote(index);

// PARTICLES
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for(let i=0;i<80;i++){
    particles.push({
        x: Math.random()*canvas.width,
        y: Math.random()*canvas.height,
        r: Math.random()*2,
        dx: Math.random()*0.5,
        dy: Math.random()*0.5
    });
}

function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    particles.forEach(p=>{
        ctx.beginPath();
        ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
        ctx.fillStyle="rgba(255,255,255,0.5)";
        ctx.fill();

        p.x += p.dx;
        p.y += p.dy;

        if(p.x>canvas.width || p.x<0) p.dx *= -1;
        if(p.y>canvas.height || p.y<0) p.dy *= -1;
    });

    requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
